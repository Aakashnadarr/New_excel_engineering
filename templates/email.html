<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Communications | Inbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden font-sans text-slate-900" x-data="emailApp()" x-init="initWebSocket()">

    <aside class="w-full md:w-80 lg:w-96 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm">
        <div class="p-5 border-b border-slate-100 bg-white sticky top-0 z-10">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-slate-800">Engineering Inbox</h1>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Live Updates (500+ Messages)</p>
                </div>
                <button @click="refresh()" 
                    class="p-2 hover:bg-slate-50 rounded-lg transition-all border border-transparent hover:border-slate-200"
                    :class="syncing ? 'animate-spin text-blue-600' : 'text-slate-400'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input 
                    type="text" 
                    x-model="searchQuery"
                    placeholder="Search drawings, POs, or senders..." 
                    class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
                >
            </div>
        </div>

        <div class="flex-1 overflow-y-auto space-y-px">
            <template x-if="filteredEmails().length === 0 && !syncing">
                <div class="p-10 text-center text-slate-400 text-sm">No matching messages found.</div>
            </template>
            
            <template x-for="email in filteredEmails()" :key="email.id">
                <div @click="selectEmail(email)"
                    :class="selectedEmail && selectedEmail.id === email.id ? 'bg-blue-50/50 border-l-4 border-blue-600' : 'hover:bg-slate-50 border-l-4 border-transparent'"
                    class="p-4 border-b border-slate-100 cursor-pointer transition-all group">
                    <div class="flex justify-between items-start mb-0.5">
                        <span class="font-bold text-slate-800 text-sm truncate pr-2" x-text="email.name"></span>
                        <span class="text-[10px] font-medium text-slate-400 whitespace-nowrap" x-text="formatTime(email.time)"></span>
                    </div>
                    <div class="text-[10px] text-slate-400 truncate mb-1 font-medium" x-text="email.from"></div>
                    <div class="text-xs font-semibold text-slate-600 truncate group-hover:text-slate-900 transition-colors" x-text="email.subject"></div>
                    <div class="text-[11px] text-slate-400 line-clamp-1 mt-1" x-text="email.snippet"></div>
                </div>
            </template>
        </div>
    </aside>

    <main class="flex-1 bg-white flex flex-col overflow-hidden relative">
        <template x-if="selectedEmail">
            <div class="h-full flex flex-col overflow-hidden">
                <div class="p-8 border-b border-slate-100 bg-white">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-2xl font-extrabold text-slate-900 leading-tight" x-text="selectedEmail.subject"></h2>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="h-10 w-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold text-sm" x-text="selectedEmail.name[0]"></div>
                        <div class="text-sm">
                            <p class="font-bold text-slate-800" x-text="selectedEmail.from"></p>
                            <p class="text-slate-400 text-xs" x-text="selectedEmail.time"></p>
                        </div>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-8">
                    <div class="max-w-4xl mx-auto">
                        <template x-if="loadingDetails">
                            <div class="flex flex-col items-center justify-center py-20 space-y-4">
                                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
                                <p class="text-slate-400 text-sm font-medium">Fetching full content and drawings...</p>
                            </div>
                        </template>

                        <div x-show="!loadingDetails" class="prose prose-slate max-w-none text-slate-700 leading-relaxed" x-html="selectedEmail.body"></div>
                        
                        <template x-if="!loadingDetails && selectedEmail.attachments && selectedEmail.attachments.length > 0">
                            <div class="mt-12 pt-8 border-t border-slate-100">
                                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Attachments (<span x-text="selectedEmail.attachments.length"></span>)</h3>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                    <template x-for="att in selectedEmail.attachments" :key="att.filename">
                                        <a :href="`data:${att.mimeType};base64,${att.data_b64}`" :download="att.filename"
                                            class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 hover:bg-white hover:shadow-md hover:border-blue-200 transition-all group">
                                            <div class="h-8 w-8 rounded-lg bg-white flex items-center justify-center shadow-sm group-hover:text-blue-600">
                                                <span x-text="att.mimeType.includes('pdf') ? 'PDF' : att.mimeType.includes('image') ? 'IMG' : 'FILE'"></span>
                                            </div>
                                            <span class="truncate font-medium text-xs" x-text="att.filename"></span>
                                        </a>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="!selectedEmail">
            <div class="flex-1 flex flex-col items-center justify-center text-slate-300">
                <div class="p-6 bg-slate-50 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                    </svg>
                </div>
                <p class="text-sm font-medium">Select a business message to read</p>
            </div>
        </template>
    </main>

    <script>
        function emailApp() {
            return {
                emails: [],
                searchQuery: '',
                selectedEmail: null,
                syncing: true,        // For the 500-email list sync
                loadingDetails: false, // For fetching specific body/attachments
                socket: null,
                
                filteredEmails() {
                    if (!this.searchQuery) return this.emails;
                    const query = this.searchQuery.toLowerCase();
                    return this.emails.filter(e => 
                        e.subject.toLowerCase().includes(query) || 
                        e.name.toLowerCase().includes(query) ||
                        e.from.toLowerCase().includes(query) ||
                        (e.snippet && e.snippet.toLowerCase().includes(query))
                    );
                },

                initWebSocket() {
                    const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
                    this.socket = new WebSocket(protocol + window.location.host + '/ws/emails/');

                    this.socket.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        
                        // Handle the initial list of 500 snippets
                        if (data.type === 'list') {
                            this.emails = data.emails;
                            this.syncing = false;
                        } 
                        // Handle the full details of a clicked email
                        else if (data.type === 'details') {
                            if (this.selectedEmail && this.selectedEmail.id === data.email_id) {
                                this.selectedEmail.body = data.body;
                                this.selectedEmail.attachments = data.attachments;
                                this.loadingDetails = false;
                            }
                        }
                    };

                    this.socket.onclose = () => {
                        setTimeout(() => this.initWebSocket(), 3000);
                    };
                },

                selectEmail(email) {
                    this.selectedEmail = email;
                    // Only fetch details if we haven't loaded them yet
                    if (!email.body) {
                        this.loadingDetails = true;
                        this.socket.send(JSON.stringify({ 
                            'action': 'get_details', 
                            'email_id': email.id 
                        }));
                    }
                },

                refresh() {
                    this.syncing = true;
                    if (this.socket) {
                        this.socket.send(JSON.stringify({ 'action': 'refresh' }));
                    }
                },

                formatTime(timeStr) {
                    if (!timeStr) return '';
                    const date = new Date(timeStr);
                    const now = new Date();
                    if (date.toDateString() === now.toDateString()) {
                        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }
                    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                }
            }
        }
    </script>
</body>
</html>
